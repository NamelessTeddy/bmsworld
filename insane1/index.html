<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="bmstable" content="https://namelessteddy.github.io/bmsworld/insane1/header.json">
    <title>発狂BMS難易度表</title>
    <style>
        body{font-family:system-ui,Segoe UI,Arial,Helvetica,sans-serif;padding:20px}
        table{border-collapse:collapse;width:100%;max-width:1200px}
        th,td{border:1px solid #ddd;padding:6px 8px;text-align:left;vertical-align:middle}
        th{background:#f7f7f7;font-size:0.85rem}
        tbody td{font-size:0.75rem;padding:3px 6px}
        a{color:#0366d6}
        pre{white-space:pre-wrap}
    </style>
</head>
<body>
    <p><a href="../">← BMS World</a></p>
    <h1>発狂BMS難易度表</h1>
    <table id="tbl">
        <thead>
            <tr>
                <th>Level</th>
                <th>Title</th>
                <th>Artist</th>
                <th>URL</th>
                <th>Chart URL</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <script>
        async function build(){
            const res = await fetch('https://namelessteddy.github.io/bmsworld/data.json');
            const data = await res.json();
            const arr = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : Object.values(data));
            if(!arr || arr.length === 0){ document.getElementById('tbl').innerText = 'No data found'; return; }
            arr.sort((a, b) => {
                const lvA = parseFloat(a.level ?? 0) || 0;
                const lvB = parseFloat(b.level ?? 0) || 0;
                if(lvA !== lvB) return lvA - lvB;
                return (a.title ?? '').localeCompare(b.title ?? '', undefined, {sensitivity: 'base'});
            });
            const tbody = document.querySelector('#tbl tbody');
            function dlLink(url){
                if(!url) return '';
                const a = document.createElement('a');
                a.href = url; a.target = '_blank'; a.textContent = 'DL';
                return a;
            }
            arr.forEach(row => {
                const tr = document.createElement('tr');
                const cells = [
                    { text: row.level != null && row.level !== '' ? '★' + row.level : '' },
                    { text: row.title ?? '' },
                    { text: row.artist ?? '' },
                    { link: row.url ?? '' },
                    { link: row.url_diff ?? '' },
                ];
                cells.forEach(cell => {
                    const td = document.createElement('td');
                    if('link' in cell){ const a = dlLink(cell.link); if(a) td.appendChild(a); }
                    else td.textContent = cell.text;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
        build().catch(e => { document.body.insertAdjacentHTML('beforeend', '<pre>' + e + '</pre>'); });
    </script>
</body>
</html>
