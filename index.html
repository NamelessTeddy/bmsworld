<!doctype html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>BMS Table — dduong259.github.io</title>
    <style>
        body{font-family:system-ui,Segoe UI,Arial,Helvetica,sans-serif;padding:20px}
        table{border-collapse:collapse;width:100%;max-width:1200px}
        th,td{border:1px solid #ddd;padding:6px 8px;text-align:left;vertical-align:top}
        th{background:#f7f7f7}
        a{color:#0366d6}
        pre{white-space:pre-wrap}
    </style>
</head>
<body>
    <h1>BMS Table</h1>
    <p>Raw JSON: <a href="./data.json" target="_blank">data.json</a></p>
    <table id="tbl">
        <thead></thead>
        <tbody></tbody>
    </table>
    <script>
        async function build(){
            const res = await fetch('./data.json');
            const data = await res.json();
            const arr = Array.isArray(data) ? data : (Array.isArray(data.items) ? data.items : Object.values(data));
            if(!arr || arr.length === 0){ document.getElementById('tbl').innerText = 'No data found'; return; }
            const keys = Array.from(arr.reduce((s, o) => { Object.keys(o).forEach(k => s.add(k)); return s; }, new Set()));
            const thead = document.querySelector('#tbl thead');
            const hdr = document.createElement('tr');
            keys.forEach(k => { const th = document.createElement('th'); th.textContent = k; hdr.appendChild(th); });
            thead.appendChild(hdr);
            const tbody = document.querySelector('#tbl tbody');
            arr.forEach(row => {
                const tr = document.createElement('tr');
                keys.forEach(k => {
                    const td = document.createElement('td');
                    const v = row[k] ?? '';
                    if(k.toLowerCase().includes('url') && v){ const a = document.createElement('a'); a.href = v; a.target = '_blank'; a.textContent = v; td.appendChild(a); }
                    else td.textContent = v;
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
        build().catch(e => { document.body.insertAdjacentHTML('beforeend', '<pre>' + e + '</pre>'); });
    </script>
</body>
</html>
